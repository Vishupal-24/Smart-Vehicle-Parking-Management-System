<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Vehicle Parking Management System</title>
    
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css">
    
    <style>
        body {
            min-height: 100vh;
            background-color: #f8f9fa;
        }
        .navbar-brand {
            font-weight: bold;
        }
        .card {
            box-shadow: 0 0.125rem 0.25rem rgba(0, 0, 0, 0.075);
        }
        .spot-available {
            background-color: #198754;
            color: white;
        }
        .spot-occupied {
            background-color: #dc3545;
            color: white;
        }
        .spot-reserved {
            background-color: #ffc107;
            color: black;
        }
        .spot {
            width: 40px;
            height: 40px;
            display: inline-flex;
            align-items: center;
            justify-content: center;
            margin: 2px;
            border-radius: 4px;
            font-size: 0.8rem;
            font-weight: bold;
        }
        .sidebar {
            min-height: calc(100vh - 56px);
            background-color: #212529;
        }
        .sidebar .nav-link {
            color: rgba(255, 255, 255, 0.8);
        }
        .sidebar .nav-link:hover,
        .sidebar .nav-link.active {
            color: white;
            background-color: rgba(255, 255, 255, 0.1);
        }
    </style>
</head>
<body>
    <div id="app">
        
    </div>

    <script src="https://cdn.jsdelivr.net/npm/vue@2.7.14/dist/vue.min.js"></script>

    <script src="https://unpkg.com/vue-router@3.6.5/dist/vue-router.min.js"></script>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>

    <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
    
    <script src="utils/api.js"></script>
    <script src="components/Navbar.js"></script>
    <script src="pages/LoginPage.js"></script>
    <script src="pages/RegisterPage.js"></script>
    <script src="pages/AdminLoginPage.js"></script>
    <script src="pages/CustomerDashboardPage.js"></script>
    <script src="pages/CustomerProfilePage.js"></script>
    <script src="pages/CustomerSearchPage.js"></script>
    <script src="pages/CustomerSummaryPage.js"></script>
    <script src="pages/CustomerBookingPage.js"></script>
    <script src="pages/AdminDashboardPage.js"></script>
    <script src="pages/AdminLotsPage.js"></script>
    <script src="pages/AdminUsersPage.js"></script>
    <script src="pages/AdminSearchPage.js"></script>
    <script src="pages/AdminSummaryPage.js"></script>
    <script src="utils/router.js"></script>
    <script src="app.js"></script>
</body>
</html>
